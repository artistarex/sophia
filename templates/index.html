<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0f;--surface:#0d1117;--surface-2:#161b22;--border:#21262d;--sophia:#c9a96e;--sophia-dim:rgba(201,169,110,0.15);--sophia-glow:rgba(201,169,110,0.06);--user:#e8e8e8;--muted:#484f58;--text:#cdd9e5;--text-dim:#768390;--accent:#388bfd;--danger:#f85149;--success:#3fb950;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;height:100vh;display:grid;grid-template-columns:280px 1fr;overflow:hidden;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sophia-identity{padding:32px 24px 24px;border-bottom:1px solid var(--border);text-align:center;}
.avatar-ring{width:72px;height:72px;border-radius:50%;margin:0 auto 16px;position:relative;display:flex;align-items:center;justify-content:center;}
.avatar-ring::before{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(var(--sophia) 0deg,transparent 120deg,var(--sophia) 240deg,transparent 360deg);animation:spin 8s linear infinite;}
.avatar-ring::after{content:'S';width:68px;height:68px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--sophia);position:relative;z-index:1;line-height:68px;text-align:center;}
@keyframes spin{to{transform:rotate(360deg);}}
.sophia-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--sophia);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;}
.sophia-status{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.5;}}
.sidebar-section{padding:20px;border-bottom:1px solid var(--border);}
.section-label{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-item{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
.stat-value{font-size:18px;color:var(--sophia);font-family:'Cormorant Garamond',serif;font-weight:300;display:block;}
.stat-label{font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.info-card{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;}
.info-time{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--sophia);display:block;line-height:1;}
.info-date{font-size:10px;color:var(--text-dim);margin-top:4px;}
.calendar-events{max-height:120px;overflow-y:auto;scrollbar-width:none;}
.event-item{padding:8px 10px;border-left:2px solid var(--sophia-dim);margin-bottom:6px;background:var(--surface-2);border-radius:0 4px 4px 0;}
.event-title{font-size:11px;color:var(--text);}
.event-when{font-size:9px;color:var(--sophia);margin-top:2px;}
.no-events{font-size:10px;color:var(--muted);font-style:italic;}
.sidebar-footer{margin-top:auto;padding:16px;display:flex;flex-direction:column;gap:6px;}
.btn-sidebar{background:none;border:1px solid var(--border);color:var(--text-dim);padding:8px 12px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.btn-sidebar:hover{border-color:var(--sophia);color:var(--sophia);background:var(--sophia-glow);}
.btn-danger:hover{border-color:var(--danger);color:var(--danger);background:rgba(248,81,73,0.06);}
.chat-area{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.chat-header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.chat-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:var(--text-dim);letter-spacing:2px;font-style:italic;}
.typing-indicator{font-size:10px;color:var(--sophia);letter-spacing:1px;opacity:0;transition:opacity 0.3s;display:flex;align-items:center;gap:6px;}
.typing-indicator.active{opacity:1;}
.typing-dots{display:flex;gap:3px;}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--sophia);animation:bounce 1.2s ease-in-out infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-4px);}}
.messages{flex:1;overflow-y:auto;padding:32px;display:flex;flex-direction:column;gap:24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.message{display:flex;gap:16px;animation:fadeUp 0.4s ease;max-width:820px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.message.user{flex-direction:row-reverse;align-self:flex-end;}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;}
.sophia-avatar{background:var(--sophia-dim);border:1px solid var(--sophia);color:var(--sophia);}
.user-avatar{background:rgba(56,139,253,0.15);border:1px solid var(--accent);color:var(--accent);font-size:11px;}
.msg-content{max-width:640px;}
.msg-role{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;color:var(--muted);}
.message.sophia .msg-role{color:var(--sophia);}
.msg-text{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.message.sophia .msg-text{font-family:'Cormorant Garamond',serif;font-size:16px;line-height:1.8;font-weight:300;}
.message.user .msg-content{align-items:flex-end;display:flex;flex-direction:column;}
.message.user .msg-text{background:var(--surface-2);border:1px solid var(--border);padding:12px 16px;border-radius:12px 2px 12px 12px;}
.greeting-block{text-align:center;padding:48px 32px;animation:fadeUp 0.8s ease;}
.greeting-name{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:var(--sophia);letter-spacing:6px;margin-bottom:8px;}
.greeting-sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;font-style:italic;}
.greeting-line{width:60px;height:1px;background:var(--sophia);margin:20px auto;opacity:0.4;}
.greeting-msg{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text);font-style:italic;max-width:400px;margin:0 auto;line-height:1.8;}
.input-area{padding:20px 32px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.input-wrapper{display:flex;align-items:flex-end;gap:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;transition:border-color 0.2s;}
.input-wrapper:focus-within{border-color:var(--sophia);box-shadow:0 0 0 3px var(--sophia-glow);}
#message-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;resize:none;outline:none;max-height:120px;line-height:1.6;scrollbar-width:none;}
#message-input::placeholder{color:var(--muted);}
.send-btn{width:36px;height:36px;border-radius:8px;background:var(--sophia-dim);border:1px solid var(--sophia);color:var(--sophia);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.send-btn:hover{background:var(--sophia);color:var(--bg);}
.send-btn:disabled{opacity:0.3;cursor:not-allowed;}
.input-hint{font-size:9px;color:var(--muted);margin-top:8px;text-align:right;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:380px;animation:fadeUp 0.3s ease;}
.modal h3{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:20px;color:var(--sophia);margin-bottom:20px;letter-spacing:2px;}
.modal input,.modal textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.modal input:focus,.modal textarea:focus{border-color:var(--sophia);}
.modal textarea{resize:vertical;min-height:70px;}
.modal-actions{display:flex;gap:8px;margin-top:8px;}
.btn-primary{flex:1;background:var(--sophia-dim);border:1px solid var(--sophia);color:var(--sophia);padding:10px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;transition:all 0.2s;}
.btn-primary:hover{background:var(--sophia);color:var(--bg);}
.btn-secondary{background:none;border:1px solid var(--border);color:var(--text-dim);padding:10px 20px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;transition:all 0.2s;}
.notification{position:fixed;top:20px;right:20px;background:var(--surface);border:1px solid var(--sophia);color:var(--sophia);padding:12px 20px;border-radius:8px;font-size:11px;z-index:200;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sophia-identity">
    <div class="avatar-ring"></div>
    <div class="sophia-name">Sophia</div>
    <div class="sophia-status"><span class="status-dot"></span><span>Aktif</span></div>
  </div>
  <div class="sidebar-section">
    <div class="section-label">Su An</div>
    <div class="info-card">
      <span class="info-time" id="clock">--:--</span>
      <div class="info-date" id="current-date">—</div>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="section-label">Hafiza</div>
    <div class="stats-grid">
      <div class="stat-item"><span class="stat-value" id="stat-messages">0</span><div class="stat-label">Mesaj</div></div>
      <div class="stat-item"><span class="stat-value" id="stat-sessions">0</span><div class="stat-label">Oturum</div></div>
      <div class="stat-item"><span class="stat-value" id="stat-facts">0</span><div class="stat-label">Bilgi</div></div>
      <div class="stat-item"><span class="stat-value" id="stat-uptime">—</span><div class="stat-label">Aktif</div></div>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="section-label">Takvim</div>
    <div class="calendar-events" id="calendar-events"><div class="no-events">Yukleniyor...</div></div>
  </div>
  <div class="sidebar-footer">
    <button class="btn-sidebar" onclick="openCalendarModal()"><span>+</span> Etkinlik Ekle</button>
    <button class="btn-sidebar btn-danger" onclick="clearMemory()"><span>↺</span> Konusmayi Sifirla</button>
  </div>
</aside>
<main class="chat-area">
  <header class="chat-header">
    <div class="chat-title">Sophia ile konusuyorsun</div>
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      dusunuyor
    </div>
  </header>
  <div class="messages" id="messages">
    <div class="greeting-block" id="greeting-block">
      <div class="greeting-name">SOPHIA</div>
      <div class="greeting-sub">Yapay Zeka Asistanin</div>
      <div class="greeting-line"></div>
      <div class="greeting-msg" id="greeting-msg">Yukleniyor...</div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="message-input" placeholder="Sophia ile konus..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter gonderir • Shift+Enter satir ekler</div>
  </div>
</main>
<div class="modal-overlay" id="calendar-modal">
  <div class="modal">
    <h3>Etkinlik Ekle</h3>
    <input type="text" id="event-title" placeholder="Baslik"/>
    <input type="date" id="event-date"/>
    <textarea id="event-note" placeholder="Not (opsiyonel)"></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCalendarModal()">Iptal</button>
      <button class="btn-primary" onclick="saveEvent()">Kaydet</button>
    </div>
  </div>
</div>
<script>
let isStreaming=false,startTime=Date.now();
async function init(){await loadGreeting();await loadStats();await loadCalendar();updateClock();setInterval(updateClock,1000);setInterval(loadStats,30000);}
async function loadGreeting(){try{const r=await fetch('/api/greeting');const d=await r.json();document.getElementById('greeting-msg').textContent=d.greeting;updateStatsUI(d.stats);}catch{document.getElementById('greeting-msg').textContent='Merhaba.';}}
function updateClock(){const n=new Date();const h=String(n.getHours()).padStart(2,'0');const m=String(n.getMinutes()).padStart(2,'0');document.getElementById('clock').textContent=`${h}:${m}`;const days=['Pazar','Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi'];const months=['','Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];document.getElementById('current-date').textContent=`${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()+1]}`;const e=Math.floor((Date.now()-startTime)/60000);document.getElementById('stat-uptime').textContent=e<60?`${e}d`:`${Math.floor(e/60)}s`;}
async function loadStats(){try{const r=await fetch('/api/stats');const d=await r.json();updateStatsUI(d);}catch{}}
function updateStatsUI(s){if(!s)return;document.getElementById('stat-messages').textContent=s.total_messages||0;document.getElementById('stat-sessions').textContent=s.session_count||0;document.getElementById('stat-facts').textContent=s.facts_learned||0;}
async function loadCalendar(){try{const r=await fetch('/api/calendar');const d=await r.json();const c=document.getElementById('calendar-events');if(!d.events||!d.events.length){c.innerHTML='<div class="no-events">Yaklasan etkinlik yok</div>';return;}c.innerHTML=d.events.map(e=>`<div class="event-item"><div class="event-title">${e.title}</div><div class="event-when">${e.label} — ${e.date}</div></div>`).join('');}catch{}}
async function sendMessage(){const input=document.getElementById('message-input');const text=input.value.trim();if(!text||isStreaming)return;input.value='';input.style.height='auto';const g=document.getElementById('greeting-block');if(g)g.remove();appendMessage('user',text);const sophiaEl=appendMessage('sophia','');const textEl=sophiaEl.querySelector('.msg-text');setStreaming(true);try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});const reader=res.body.getReader();const decoder=new TextDecoder();let buffer='';while(true){const{done,value}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const lines=buffer.split('\n');buffer=lines.pop();for(const line of lines){if(!line.startsWith('data: '))continue;try{const data=JSON.parse(line.slice(6));if(data.text){textEl.textContent+=data.text;scrollToBottom();}if(data.done)loadStats();if(data.error)textEl.textContent='Hata: '+data.error;}catch{}}}}catch(e){textEl.textContent='Baglanti hatasi.';}setStreaming(false);input.focus();}
function appendMessage(role,text){const c=document.getElementById('messages');const isUser=role==='user';const div=document.createElement('div');div.className=`message ${isUser?'user':'sophia'}`;div.innerHTML=`<div class="msg-avatar ${isUser?'user-avatar':'sophia-avatar'}">${isUser?'SE':'S'}</div><div class="msg-content"><div class="msg-role">${isUser?'Semih':'Sophia'}</div><div class="msg-text">${text}</div></div>`;c.appendChild(div);scrollToBottom();return div;}
function scrollToBottom(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;}
function setStreaming(a){isStreaming=a;document.getElementById('send-btn').disabled=a;document.getElementById('typing-indicator').classList.toggle('active',a);}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function openCalendarModal(){document.getElementById('event-date').value=new Date().toISOString().split('T')[0];document.getElementById('calendar-modal').classList.add('active');}
function closeCalendarModal(){document.getElementById('calendar-modal').classList.remove('active');document.getElementById('event-title').value='';document.getElementById('event-note').value='';}
async function saveEvent(){const title=document.getElementById('event-title').value.trim();const date=document.getElementById('event-date').value;const note=document.getElementById('event-note').value.trim();if(!title||!date){showNotification('Baslik ve tarih zorunlu.');return;}try{const r=await fetch('/api/calendar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,date,note})});const d=await r.json();if(d.success){showNotification('Etkinlik eklendi!');closeCalendarModal();loadCalendar();}}catch{showNotification('Hata olustu.');}}
async function clearMemory(){if(!confirm('Konusma gecmisi silinsin mi?'))return;try{await fetch('/api/memory/clear',{method:'POST'});document.getElementById('messages').innerHTML='';showNotification('Temizlendi.');loadStats();}catch{}}
function showNotification(msg){const el=document.createElement('div');el.className='notification';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}
document.getElementById('calendar-modal').addEventListener('click',function(e){if(e.target===this)closeCalendarModal();});
init();
</script>
</body>
</html>
